services:
  - type: web
    name: eostrata
    runtime: python
    plan: starter
    buildCommand: pip install uv && uv sync --no-dev
    startCommand: uv run uvicorn eostrata.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EOSTRATA_ZARR_ROOT
        value: /data/zarr
      - key: EOSTRATA_RAW_DIR
        value: /data/raw
      - key: EOSTRATA_CATALOG_PATH
        value: /data/catalog.json
      - key: EOSTRATA_LOG_FILE
        value: /data/eostrata.log
      - key: EOSTRATA_CORS_ORIGINS
        value: '["*"]'
      # Bounding box — adjust to your region of interest
      - key: EOSTRATA_BBOX_WEST
        value: "-18.0"
      - key: EOSTRATA_BBOX_SOUTH
        value: "4.0"
      - key: EOSTRATA_BBOX_EAST
        value: "15.0"
      - key: EOSTRATA_BBOX_NORTH
        value: "24.0"
      # Optional: data source credentials — set via Render dashboard
      # - key: EOSTRATA_CGLS_API_KEY
      #   sync: false
      # - key: EOSTRATA_ADS_KEY
      #   sync: false
      # - key: EOSTRATA_CDSE_USER
      #   sync: false
      # - key: EOSTRATA_CDSE_PASSWORD
      #   sync: false
    disk:
      name: eostrata-data
      mountPath: /data
      sizeGB: 10
