# eostrata scheduler configuration
#
# Each job specifies a data source, parameters, and a cron schedule.
#
# Fields:
#   id          — unique job identifier
#   source      — registered source id: worldpop | chirps | cds | cams | tropomi
#   params      — keyword args forwarded to source.download() / source.to_zarr()
#   cron        — cron expression: "minute hour day-of-month month day-of-week"
#   auto_period — if true, the period (year/month/day) is derived from
#                 source.latest_available() — the most recent period for which
#                 data is expected to be available given the source's lag.
#                 Overrides any year/month/day values in params.
#                 When false (default), params must include explicit year/month/day.
#   enabled     — set to false to disable without deleting the job (default: true)
#
# webhook_url (optional): POST alert when a job fails after all retries.

# webhook_url: "https://example.com/alerts/eostrata"

jobs:
  # ── WorldPop ───────────────────────────────────────────────────────────────
  # - id: worldpop_nga
  #   source: worldpop
  #   params:
  #     iso3: NGA
  #   cron: "0 2 1 2 *"    # 02:00 on Feb 1st (data for the previous year)
  #   auto_period: true
  #   enabled: false

  # ── CHIRPS ─────────────────────────────────────────────────────────────────
  # Monthly precipitation — runs on the 15th of each month to catch the ~45-day lag.
  # - id: chirps_monthly
  #   source: chirps
  #   params: {}
  #   cron: "0 3 15 * *"   # 03:00 on the 15th of each month
  #   auto_period: true
  #   enabled: false

  # ── ERA5 / CDS ─────────────────────────────────────────────────────────────
  # ERA5 monthly 2m temperature — runs on the 1st of each month (3-month lag).
  # - id: era5_t2m
  #   source: cds
  #   params:
  #     variable: t2m
  #   cron: "0 4 1 * *"    # 04:00 on the 1st of each month
  #   auto_period: true
  #   enabled: false

  # ── Sentinel NDVI (CGLS) ───────────────────────────────────────────────────
  # CGLS NDVI 300m v2 from Sentinel-3 OLCI — 10-day (dekadal) composites.
  # Three runs per month to catch each dekad after its ~5-day publication lag:
  #   Dekad 1 (days  1-10) → published ~15th  → run on the 16th
  #   Dekad 2 (days 11-20) → published ~25th  → run on the 26th
  #   Dekad 3 (days 21-end)→ published ~5th   → run on the 6th
  #
  # Note: auto_period sets year/month from latest_available().  Dekad must be
  # specified explicitly in params because the scheduler does not yet resolve
  # dekadal periods automatically.
  #
  # - id: sentinel_ndvi_dekad1
  #   source: sentinel_ndvi
  #   params:
  #     dekad: 1
  #   cron: "0 5 16 * *"   # 05:00 on the 16th of each month
  #   auto_period: true
  #   enabled: false
  #
  # - id: sentinel_ndvi_dekad2
  #   source: sentinel_ndvi
  #   params:
  #     dekad: 2
  #   cron: "0 5 26 * *"   # 05:00 on the 26th of each month
  #   auto_period: true
  #   enabled: false
  #
  # - id: sentinel_ndvi_dekad3
  #   source: sentinel_ndvi
  #   params:
  #     dekad: 3
  #   cron: "0 5 6 * *"    # 05:00 on the 6th of each month
  #   auto_period: true
  #   enabled: false

  # ── CAMS EAC4 (Atmosphere Data Store) ─────────────────────────────────────
  # CAMS monthly surface air quality — runs on the 1st of each month (~4-month lag).
  # Requires ~/.adsapirc or EOSTRATA_ADS_URL + EOSTRATA_ADS_KEY.
  #
  # - id: cams_pm2p5
  #   source: cams
  #   params:
  #     variable: pm2p5
  #   cron: "0 6 1 * *"    # 06:00 on the 1st of each month
  #   auto_period: true
  #   enabled: false
  #
  # - id: cams_no2
  #   source: cams
  #   params:
  #     variable: no2
  #   cron: "0 6 1 * *"    # 06:00 on the 1st of each month
  #   auto_period: true
  #   enabled: false

  # ── TROPOMI Sentinel-5P (Copernicus Data Space) ────────────────────────────
  # TROPOMI daily NO2 — runs daily, 3 days after sensing (OFFLINE product lag).
  # Requires EOSTRATA_CDSE_USER and EOSTRATA_CDSE_PASSWORD.
  #
  # Note: auto_period sets year/month/day from source.latest_available().
  # To ingest a specific date, set year/month/day explicitly in params instead.
  #
  # - id: tropomi_no2_daily
  #   source: tropomi
  #   params:
  #     variable: no2
  #   cron: "0 7 * * *"    # 07:00 every day (picks up data from 3 days ago)
  #   auto_period: true
  #   enabled: false
  #
  # - id: tropomi_co_daily
  #   source: tropomi
  #   params:
  #     variable: co
  #   cron: "0 8 * * *"    # 08:00 every day
  #   auto_period: true
  #   enabled: false
