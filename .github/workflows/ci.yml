name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dev dependencies
        run: uv sync --extra dev
      - name: Run ruff check
        run: uv run ruff check eostrata/ tests/ --select E,W,F,I,UP,B,C4,SIM --ignore E501,B008,SIM108
      - name: Run ruff format check
        run: uv run ruff format --check eostrata/ tests/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra scheduler

      - name: Install h5py (NetCDF backend)
        run: uv add --dev h5py

      - name: Run tests
        run: uv run pytest tests/ -q --tb=short --cov=eostrata --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
