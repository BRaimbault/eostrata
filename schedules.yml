# eostrata scheduler configuration
#
# Each job specifies a data source, parameters, and a cron schedule.
#
# Fields:
#   id          — unique job identifier
#   source      — registered source id: worldpop | chirps | cds
#   params      — keyword args forwarded to source.download() / source.to_zarr()
#   cron        — cron expression: "minute hour day-of-month month day-of-week"
#   auto_period — if true, year/month are derived from source.latest_available()
#                 (overrides year/month values in params)
#   enabled     — set to false to disable without deleting the job (default: true)
#
# webhook_url (optional): POST alert when a job fails after all retries.

# webhook_url: "https://example.com/alerts/eostrata"

jobs:
  # ── WorldPop ───────────────────────────────────────────────────────────────
  # - id: worldpop_nga
  #   source: worldpop
  #   params:
  #     iso3: NGA
  #   cron: "0 2 1 2 *"    # 02:00 on Feb 1st (data for the previous year)
  #   auto_period: true
  #   enabled: false

  # ── CHIRPS ─────────────────────────────────────────────────────────────────
  # Monthly precipitation — runs on the 15th of each month to catch the ~45-day lag.
  # - id: chirps_monthly
  #   source: chirps
  #   params: {}
  #   cron: "0 3 15 * *"   # 03:00 on the 15th of each month
  #   auto_period: true
  #   enabled: false

  # ── ERA5 / CDS ─────────────────────────────────────────────────────────────
  # ERA5 monthly 2m temperature — runs on the 1st of each month (3-month lag).
  # - id: era5_t2m
  #   source: cds
  #   params:
  #     variable: t2m
  #   cron: "0 4 1 * *"    # 04:00 on the 1st of each month
  #   auto_period: true
  #   enabled: false
